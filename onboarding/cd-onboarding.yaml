# cd-onboarding.yaml — Generated 2026-06-17 15:57:24 UTC
schemaVersion: "1.0"
deployStrategy: rolling
approvalRequired: true
stages:
  - id: smoke
    enabled: true
    config:
      healthCheckUrl: https://drtgtgg.npci.org.in/health
      timeoutSeconds: 120
  - id: load
    enabled: true
    config:
      scenarioFile: tests/load/drtgtgg-load.jmx
      virtualUsers: 50
      durationMinutes: 10
  - id: deploy-qa
    enabled: true
    config:
      environment: qa
      strategy: rolling
      entryCommand: kubectl apply -f k8s/qa/
      rollbackOnFailure: true
      approvalGate: false
  - id: deploy-staging
    enabled: true
    config:
      environment: staging
      strategy: canary
      entryCommand: kubectl apply -f k8s/staging/
      rollbackOnFailure: true
      approvalGate: true
      canaryWeight: 20
