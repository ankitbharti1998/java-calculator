# cd-onboarding.yaml — Generated 2026-06-12 17:05:50 UTC
schemaVersion: "1.0"
deployStrategy: rolling
approvalRequired: true
stages:
  - id: smoke
    enabled: true
    config:
      healthCheckUrl: https://java-calculator.npci.org.in/health
      timeoutSeconds: 120
  - id: load
    enabled: true
    config:
      scenarioFile: tests/load/java-calculator-load.jmx
      virtualUsers: 50
      durationMinutes: 10
  - id: deploy-dev
    enabled: true
    config:
      environment: dev
      strategy: rolling
      entryCommand: kubectl apply -f k8s/dev/
      rollbackOnFailure: true
      approvalGate: false
