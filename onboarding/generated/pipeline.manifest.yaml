# application-onboarding.yaml — Generated 2026-06-12 17:10:36 UTC
schemaVersion: "1.0"
type: java
languageVersion: "17"
packageManager: maven
artifactName: java-calculator
artifactPath: target/java-calculator.jar
dockerfile:
  enabled: true
  path: Dockerfile
deployTarget:
  platform: kubernetes
  namespace: default
  cluster: prod-cluster-01
buildCommand: mvn clean package -DskipTests
testCommand: mvn test

---
# ci-onboarding.yaml — Generated 2026-06-12 17:10:36 UTC
schemaVersion: "1.0"
triggers:
  - push
  - pull_request
stages:
  - id: build
    override: false
    config:
      command: sh onboarding/ci/build/default-build.sh
  - id: test
    override: false
    config:
      command: sh onboarding/ci/test/default-test.sh

---
# cd-onboarding.yaml — Generated 2026-06-12 17:10:36 UTC
schemaVersion: "1.0"
deployStrategy: rolling
approvalRequired: true
stages:
  - id: smoke
    enabled: true
    config:
      healthCheckUrl: https://java-calculator.npci.org.in/health
      timeoutSeconds: 120
  - id: load
    enabled: true
    config:
      scenarioFile: tests/load/java-calculator-load.jmx
      virtualUsers: 50
      durationMinutes: 10
  - id: deploy-dev
    enabled: true
    config:
      environment: dev
      strategy: rolling
      entryCommand: kubectl apply -f k8s/dev/
      rollbackOnFailure: true
      approvalGate: false
